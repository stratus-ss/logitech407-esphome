esphome:
  name: bt-temp-gatherer
  #name: bt-temp-gatherer

esp32:
  framework:
    type: esp-idf
  board: nodemcu-32s

# Enable logging
logger:
  level: DEBUG  # Must be DEBUG to allow z407_controller DEBUG logs
  logs:
    esp32_ble_tracker: INFO     # Reduce BLE spam
    sensor: INFO                # Reduce sensor spam
    xiaomi_lywsd03mmc: INFO     # Reduce temp sensor spam
    z407_controller: DEBUG      # Enable debug logs for Z407

# Enable Home Assistant API
api:
  encryption:
    key: "NgaeXLBu4+OzWHQavyDBqymbhU8xB9AAO/DN9AVjpdo="

ota:
  - platform: esphome
    password: "b2eb2ee6c8f9c31ec74cfc8f572b83dd"

wifi:
  ssid: "NotFreeIOT"
  password: "goodlife"
  #domain: .stratus.local
  #use_address: 
  fast_connect: true
  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Bt-Temp-Gatherer"
    password: "yayM3Ha9Cb6N"
  manual_ip: 
    static_ip: 192.168.66.70
    gateway: 192.168.66.7
    subnet: 255.255.255.0

captive_portal:

# ========================================
# Z407 Speaker Controller Component
# ========================================
# Add the Z407 custom component from GitHub
external_components:
  - source: github://stratus-ss/logitech407-esphome
    components: [z407_controller]
    refresh: 0s  # Force refresh to get latest changes

# BLE tracker - shared by both temperature sensors and Z407
esp32_ble_tracker:
  scan_parameters:
    active: true
    interval: 320ms
    window: 30ms

# BLE client for Z407 connection
ble_client:
  - mac_address: "EF:94:97:10:B6:C5"
    id: z407_ble_client
    auto_connect: true

# Z407 Controller
z407_controller:
  id: z407
  ble_client_id: z407_ble_client
  auto_reconnect: true
  connection_timeout: 30s

# ========================================
# Temperature Sensors (Original Configuration)
# ========================================
sensor:
  - platform: xiaomi_lywsd03mmc
    mac_address: "A4:C1:38:B3:52:3A"
    bindkey: "35907c9f370c5f0b9c54c605c7e808a2"
    temperature:
      name: "Upstairs Temperature"
    humidity:
      name: "Upstairs Humidity"
    battery_level:
      name: "Upstairs Battery Level"
  - platform: xiaomi_lywsd03mmc
    mac_address: "A4:C1:38:AD:36:C4"
    bindkey: "6a4ed09e8bf3ed7d992f5abfb4c7d514"
    temperature:
      name: "Kitchen Temperature"
    humidity:
      name: "Kitchen Humidity"
    battery_level:
      name: "Kitchen Battery Level"
  - platform: xiaomi_lywsd03mmc
    mac_address: "A4:C1:38:72:6F:4A"
    bindkey: "07107575ab4f45fd855c3d97302b48b2"
    temperature:
      name: "School Room Temperature"
    humidity:
      name: "School Room Humidity"
    battery_level:
      name: "School Room Battery Level"
  - platform: xiaomi_lywsd03mmc
    mac_address: "A4:C1:38:BF:BA:8D"
    bindkey: "f9dc9179c1d2ebcd397275e5659e8810"
    temperature:
      name: "Master Bedroom Temperature"
    humidity:
      name: "Master Bedroom Humidity"
    battery_level:
      name: "Master Bedroom Battery Level"
  - platform: xiaomi_lywsd03mmc
    mac_address: "A4:C1:38:E4:F3:86"
    bindkey: "ae0e962315b3880c287272de5dfa754d"
    temperature:
      name: "Office Temperature"
    humidity:
      name: "Office Humidity"
    battery_level:
      name: "Office Battery Level"
  - platform: xiaomi_lywsd03mmc
    mac_address: "A4:C1:38:5A:8D:42"
    bindkey: "ee514ef0dc83ae76c9e2881734e5dfb1"
    temperature:
      name: "Thermostat Temperature"
    humidity:
      name: "Thermostat Humidity"
    battery_level:
      name: "Thermostat Battery Level"
  - platform: xiaomi_lywsd03mmc
    mac_address: "A4:C1:38:E4:30:14"
    bindkey: "a73b053b0711c90508ef4e4d65c4146a"
    temperature:
      name: "Projector Room Temperature"
    humidity:
      name: "Projector Room Humidity"
    battery_level:
      name: "Projector Room Battery Level"

  # ========================================
  # Z407 Signal Strength Sensor
  # ========================================
  - platform: z407_controller
    z407_controller_id: z407
    rssi:
      name: "Z407 Signal Strength"
      update_interval: 60s

# ========================================
# Z407 Control Buttons
# ========================================
button:
  # Volume controls
  - platform: z407_controller
    z407_controller_id: z407
    volume_up:
      name: "Z407 Volume Up"
      icon: mdi:volume-plus
    volume_down:
      name: "Z407 Volume Down"
      icon: mdi:volume-minus
  
  # Bass controls
  - platform: z407_controller
    z407_controller_id: z407
    bass_up:
      name: "Z407 Bass Up"
      icon: mdi:music-clef-bass
    bass_down:
      name: "Z407 Bass Down"
      icon: mdi:music-clef-bass
  
  # Playback controls
  - platform: z407_controller
    z407_controller_id: z407
    play_pause:
      name: "Z407 Play/Pause"
      icon: mdi:play-pause
    next_track:
      name: "Z407 Next Track"
      icon: mdi:skip-next
    previous_track:
      name: "Z407 Previous Track"
      icon: mdi:skip-previous

# ========================================
# Z407 Input Source Selector
# ========================================
select:
  - platform: z407_controller
    z407_controller_id: z407
    input_source:
      name: "Z407 Input Source"
      icon: mdi:audio-input-stereo-minijack

# ========================================
# Z407 Connection Status
# ========================================
binary_sensor:
  - platform: z407_controller
    z407_controller_id: z407
    connection:
      name: "Z407 Connected"
      device_class: connectivity

# ========================================
# System Controls
# ========================================
switch:
  - platform: restart
    name: "Bt Temp Gatherer Restart"

