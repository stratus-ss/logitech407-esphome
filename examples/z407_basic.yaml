# Basic Z407 Controller Configuration
# This example shows the minimal configuration needed to control Z407 speakers

substitutions:
  device_name: z407-controller
  friendly_name: "Z407 Speakers"
  # Replace with your Z407's MAC address (use discovery mode first if unknown)
  z407_mac: "AA:BB:CC:DD:EE:FF"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: esp-idf  # Required for stable BLE

# Enable logging
logger:
  level: DEBUG
  logs:
    z407_controller: DEBUG      # Enable debug logs for Z407

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true

  # Enable fallback hotspot
  ap:
    ssid: "${device_name} Fallback"
    password: !secret ap_password

captive_portal:

# ========================================
# Z407 Speaker Controller Component
# ========================================
# Add the Z407 custom component from GitHub
external_components:
  - source: github://stratus-ss/logitech407-esphome
    components: [z407_controller]
    refresh: 0s  # Force refresh to get latest changes

# BLE tracker for Z407 connection
esp32_ble_tracker:
  scan_parameters:
    active: true
    interval: 320ms
    window: 30ms

# Configure BLE client for Z407
ble_client:
  - mac_address: ${z407_mac}
    id: z407_ble_client
    auto_connect: true

# Z407 Controller component
z407_controller:
  id: z407
  ble_client_id: z407_ble_client
  auto_reconnect: true
  connection_timeout: 30s

# ========================================
# Z407 Control Buttons
# ========================================
button:
  # Volume controls
  - platform: z407_controller
    z407_controller_id: z407
    volume_up:
      name: "Z407 Volume Up"
      icon: mdi:volume-plus
    volume_down:
      name: "Z407 Volume Down"
      icon: mdi:volume-minus

  # Bass controls
  - platform: z407_controller
    z407_controller_id: z407
    bass_up:
      name: "Z407 Bass Up"
      icon: mdi:music-clef-bass
    bass_down:
      name: "Z407 Bass Down"
      icon: mdi:music-clef-bass

# Z407 Input Source Selector
# ========================================
=======
  # Playback controls
  - platform: z407_controller
    z407_controller_id: z407
    play_pause:
      name: "Z407 Play/Pause"
      icon: mdi:play-pause
    next_track:
      name: "Z407 Next Track"
      icon: mdi:skip-next
    previous_track:
      name: "Z407 Previous Track"
      icon: mdi:skip-previous

  # Bluetooth pairing control
  - platform: z407_controller
    z407_controller_id: z407
    bluetooth_pair:
      name: "Z407 Bluetooth Pair"
      icon: mdi:bluetooth-connect

# ========================================
# Z407 Input Source Selector
# ================================================================================
# Z407 Input Source Selector
# ========================================
select:
  - platform: z407_controller
    z407_controller_id: z407
    input_source:
      name: "Z407 Input Source"
      icon: mdi:audio-input-stereo-minijack

# ========================================
# Z407 Connection Status
# ========================================
binary_sensor:
  - platform: z407_controller
    z407_controller_id: z407
    connection:
      name: "Z407 Connected"
      device_class: connectivity

# ========================================
# Z407 Signal Strength Sensor
# ========================================
sensor:
  - platform: z407_controller
    z407_controller_id: z407
    rssi:
      name: "Z407 Signal Strength"
      update_interval: 60s
